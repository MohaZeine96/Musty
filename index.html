        <div id="app">
          <div id="header-top">
            <h3>Musty Player</h3>
          </div>
          <div id="Container-aside-mainContent">
          
            <div id="aside">
              <ul>
                <li class="active" id="home">
                  <img src="img/icons8-musical-notes-30.png" alt="Home" />

                </li>
                <li id="recent">
                  <img src="img/icons8-time-machine-30.png" alt="Recent" />

                </li>
                <li class="line"></li>
                <li id="playlists">
                  <img src="img/icons8-playlist-30.png" alt="Playlists" />
                  <span>Playlists</span>
                </li>
              </ul>
              <ul id="Settings">
                <li id="settings">

                  </div>

                    <span>geners: <span> All</span></span>
                </div>

                </div>

             <div id="control-bar-and-tagImage-and-prograss-bar">

            <div id="prograss-container">
              <div id="prograss-bar"></div>
            </div>
            <div class="time-Container">
                <span id="current-time">1:25</span>
                <span id="total-time">5:00</span>
              </div>
            <div id="Player-control-ArtTag">
              <div class="Player-control-ArtTag-container">
                <div id="ArtTag">
                  <img id="artTag" src="img/music-note.svg" alt="Album Art" />
                </div>
                <div class="media-info">
                  <h3 id="song-title">Song Title</h3>
                  <p id="song-artist">Artist Name</p>
                </div>
              
              <div id="Player-controler">
                
                <button id="prev">
                  <img src="img/icons8-end-50.png" alt="Previous" />
                </button>
                <button id="play">
                  <img src="img/icons8-play-50.png" alt="Play" />
                </button>
           
                <button id="next">
                  <img src="img/icons8-end-50.png" alt="Next" />
                </button>
                <button id="repeat">
                  <img src="img/icons8-repeat-50.png" alt="Repeat" /> 
                </button>
                <button id="volume">
                  <img src="img/icons8-speaker-50.png" alt="Volume" />
